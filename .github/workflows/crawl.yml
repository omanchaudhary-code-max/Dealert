name: Daily Daraz Price Crawl

on:
  schedule:
    - cron: '45 20 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Crawler/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Chrome and detect version
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install ./google-chrome-stable_current_amd64.deb -y
          CHROME_VER=$(google-chrome --version | grep -oP '\d+' | head -1)
          echo "Detected Chrome major version: $CHROME_VER"
          echo "CHROME_VER=$CHROME_VER" >> $GITHUB_ENV

      - name: Install Python dependencies
        working-directory: ./Crawler
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        working-directory: ./Crawler
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB: ${{ secrets.MONGO_DB }}
          DELAY_MIN: 10
          DELAY_MAX: 20
          MAX_PRODUCTS_PER_CATEGORY: 50
          CATEGORIES: laptops,smartphones,televisions,earphones-headsets,mens-shoes,womens-shoes,mens-t-shirts,books,kitchen-appliances,cameras
          PROJECT_END_DATE: 2026-07-30
          CRAWL_MODE: discovery
          LOG_LEVEL: INFO
          # CHROME_VER is set automatically by the Install Chrome step above
          # CHROME_BINARY not needed — google-chrome is on PATH in ubuntu-latest

      - name: Upload crawler log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: crawler-log-${{ github.run_number }}
          path: Crawler/logs/crawler.log
          retention-days: 30